kind = "web"
previewPath = "/"
title = "InSureGig"
version = "1.0.0"
id = "artifacts/insure-gig"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23273

[services.development]
run = "pnpm --filter @workspace/insure-gig run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/insure-gig", "run", "build" ]
publicDir = "artifacts/insure-gig/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23273"
BASE_PATH = "/"
